
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dwani Of Sisters</title>
<style>
body{font-family:Arial;margin:0;background:#fff4f8}
header{background:#d81b60;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;padding:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px #ccc;overflow:hidden}
.card img{width:100%;height:240px;object-fit:cover}
.info{padding:10px}
button{background:#d81b60;color:#fff;border:none;padding:10px 15px;border-radius:8px;cursor:pointer}
#cart{position:fixed;top:70px;right:10px;width:320px;background:#fff;border:1px solid #ccc;padding:15px;border-radius:10px}
input,textarea{width:100%;padding:8px;margin:6px 0}
</style>
</head>
<body>
<header>
<h2>Dwani Of Sisters</h2>
<div>🛒 Cart: <span id="count">0</span></div>
</header>

<div class="grid" id="products"></div>

<div id="cart">
<h3>Your Cart</h3>
<div id="items">No items</div>
<hr>
<b>Total: ₹<span id="total">0</span></b>
<h4>Checkout</h4>
<input placeholder="Full Name">
<input placeholder="Mobile Number">
<textarea placeholder="Address"></textarea>
<button onclick="pay()">Proceed to Payment</button>
</div>

<script>
const products=[
{img:"IMG-20260709-WA0070.jpg",name:"Stone Bangle Set",price:249},{img:"IMG-20260709-WA0071.jpg",name:"Pink Glass Bangles",price:199},{img:"IMG-20260709-WA0072.jpg",name:"Designer Bangles",price:299},{img:"IMG-20260709-WA0073.jpg",name:"Blue Bangle Set",price:249},{img:"IMG-20260709-WA0076.jpg",name:"Antique Bangle Set",price:349},{img:"IMG-20260709-WA0080.jpg",name:"Jewellery Gift Box",price:799},{img:"IMG-20260709-WA0081.jpg",name:"Floral Hair Clip",price:149},{img:"IMG-20260709-WA0083.jpg",name:"Stone Ring",price:199},{img:"IMG-20260709-WA0084.jpg",name:"Butterfly Clip",price:179},{img:"IMG-20260709-WA0085.jpg",name:"Satin Scrunchie",price:99},{img:"IMG-20260709-WA0086.jpg",name:"Black Flower Clip",price:199},{img:"IMG-20260709-WA0087.jpg",name:"Hair Claw",price:199},{img:"IMG-20260709-WA0088.jpg",name:"Designer Earrings",price:399},{img:"IMG-20260709-WA0089.jpg",name:"Bangle Combo",price:299},{img:"IMG-20260709-WA0090.jpg",name:"Premium Bangles",price:349},{img:"IMG-20260709-WA0092.jpg",name:"Traditional Earrings",price:449},{img:"IMG-20260709-WA0093.jpg",name:"Bracelet",price:249},{img:"IMG-20260709-WA0094.jpg",name:"Pendant Necklace",price:349},{img:"IMG-20260709-WA0095.jpg",name:"Jhumka Earrings",price:399},{img:"IMG-20260709-WA0096.jpg",name:"Finger Ring",price:199},{img:"IMG-20260709-WA0097.jpg",name:"Charm Bracelet",price:299},{img:"IMG-20260709-WA0098.jpg",name:"Gift Set",price:699},{img:"IMG-20260709-WA0100.jpg",name:"Necklace",price:499},{img:"IMG-20260709-WA0101.jpg",name:"Fashion Chain",price:299},{img:"IMG-20260709-WA0113.jpg",name:"Pink Bangles",price:249},{img:"IMG-20260709-WA0114.jpg",name:"Leaf Earrings",price:249},{img:"IMG-20260709-WA0115.jpg",name:"Bow Hair Band",price:199},{img:"IMG-20260709-WA0116.jpg",name:"Stud Earrings",price:149},{img:"IMG-20260709-WA0117.jpg",name:"Rose Earrings",price:249},
];
let cart=[];
const grid=document.getElementById('products');
products.forEach((p,i)=>{
grid.innerHTML+=`<div class="card"><img src="${p.img}"><div class="info"><h3>${p.name}</h3><p>₹${p.price}</p><button onclick="add(${i})">Add to Cart</button></div></div>`;
});
function add(i){cart.push(products[i]);render();}
function render(){
document.getElementById('count').textContent=cart.length;
if(cart.length==0){items.innerHTML="No items";total.textContent=0;return;}
let t=0,s="";
cart.forEach(c=>{t+=c.price;s+=c.name+" - ₹"+c.price+"<br>";});
items.innerHTML=s;total.textContent=t;
}
function pay(){
alert("Checkout page is ready. To accept real payments, connect Razorpay, PhonePe, or another payment gateway. HTML alone cannot process payments.");
}
</script>
</body></html>
