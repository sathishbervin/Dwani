<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dwani Of Sisters - Version 4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>Dwani Of Sisters</h1>
<input id="search" placeholder="Search products...">
<button id="cartBtn">🛒 Cart (<span id="count">0</span>)</button>
</header>

<nav>
<button class="cat">All</button>
<button class="cat">Bangles</button>
<button class="cat">Earrings</button>
<button class="cat">Hair Accessories</button>
<button class="cat">Necklaces</button>
</nav>

<main>
<section id="products" class="grid"></section>

<aside id="cart">
<h2>Your Cart</h2>
<div id="cartItems">No items.</div>
<p>Subtotal: ₹<span id="subtotal">0</span></p>
<p>Delivery: ₹50</p>
<h3>Total: ₹<span id="total">50</span></h3>

<h3>Checkout</h3>
<input placeholder="Full Name">
<input placeholder="Mobile Number">
<input placeholder="House / Flat">
<input placeholder="Street">
<input placeholder="City">
<input placeholder="State">
<input placeholder="Pincode">
<select>
<option>Cash on Delivery</option>
<option>UPI (Coming Soon)</option>
</select>
<button onclick="placeOrder()">Place Order</button>
</aside>
</main>
<script src="script.js"></script>
</body>
</html>
